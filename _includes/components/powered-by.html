<!-- 
  file: powered-by.html
  path:_includes/powered-by.html
  description: This file is used to display the powered by section on the home page.
 -->

<div class="row row-cols-1 row-cols-md-3 g-4">
  {% for power in site.powered_by %}
  <div class="col">
    <div class="card h-100">
      <div class="card-body d-flex align-items-start">
        <div>
          <h5 class="card-title">{{ power.name }}</h5>
          {% if power.version %}
          <p class="card-text small text-body-secondary mb-2">Version {{ power.version }}</p>
          {% endif %}
          <a href="{{ power.url }}" class="btn btn-primary btn-sm" target="_blank" rel="nofollow noopener noreferrer">Go to site</a>
        </div>
        <i class="{{ site.default_icon }} {{ power.icon }} fs-1 ms-auto text-primary" aria-hidden="true"></i>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
