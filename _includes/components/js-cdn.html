<!--
  ===================================================================
  JAVASCRIPT - Local vendor libraries
  ===================================================================
  
  File: js-cdn.html
  Path: _includes/components/js-cdn.html
  Purpose: Load jQuery and Bootstrap from assets/vendor (no runtime CDN).
  
  Libraries:
  - jQuery 3.7.1
  - Bootstrap 5.3.3 bundle (includes Popper.js)
  
  Refresh: ./scripts/vendor-install.sh (see vendor-manifest.json)
  ===================================================================
-->

<!-- jQuery 3.7.1 -->
<script src="{{ '/assets/vendor/jquery/jquery-3.7.1.min.js' | relative_url }}"></script>

<!-- Bootstrap 5.3.3 Bundle (includes Popper.js) -->
<script src="{{ '/assets/vendor/bootstrap/js/bootstrap.bundle.min.js' | relative_url }}"></script>

<!-- Navigation scripts - Offcanvas, dropdowns, mobile interactions -->
<script src="{{ '/assets/js/navigation.js' | relative_url }}?t={{ site.time | date: '%s' }}"></script>

<!-- Navigation ES6 Modules - Enhanced sidebar, scroll spy, keyboard shortcuts, gestures -->
<script type="module" src="{{ '/assets/js/modules/navigation/index.js' | relative_url }}"></script>

<!-- Search modal controller -->
<script src="{{ '/assets/js/search-modal.js' | relative_url }}"></script>

<!-- fffuel-style background customizer (skin switching, toggle, opacity) -->
<script src="{{ '/assets/js/background-customizer.js' | relative_url }}"></script>

<!-- Obsidian wiki-link / embed / tag client-side resolver (fallback for the
     remote_theme GH Pages build, where _plugins/obsidian_links.rb cannot run). -->
{%- assign obsidian_attachments_path = site.obsidian.attachments_path | default: '/assets/images/notes' -%}
<script>
  window.OBSIDIAN_WIKI_INDEX_URL = {{ '/assets/data/wiki-index.json' | relative_url | jsonify }};
  window.OBSIDIAN_ATTACHMENTS_PATH = {{ obsidian_attachments_path | relative_url | jsonify }};
  window.OBSIDIAN_TAG_BASE = {{ '/tags/' | relative_url | jsonify }};
</script>
<script defer src="{{ '/assets/js/obsidian-wiki-links.js' | relative_url }}"></script>
