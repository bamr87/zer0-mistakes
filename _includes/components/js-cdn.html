<!--
  ===================================================================
  JAVASCRIPT - Local vendor libraries
  ===================================================================
  
  File: js-cdn.html
  Path: _includes/components/js-cdn.html
  Purpose: Load Bootstrap from assets/vendor (no runtime CDN).
  
  Libraries:
  - Bootstrap 5.3.3 bundle (includes Popper.js)
  
  Refresh: ./scripts/vendor-install.sh (see vendor-manifest.json)
  ===================================================================
-->

<!-- Bootstrap 5.3.3 Bundle (includes Popper.js) -->
<script src="{{ '/assets/vendor/bootstrap/js/bootstrap.bundle.min.js' | relative_url }}"></script>

<!-- Navigation ES Modules — orchestrator for sidebar, scroll spy, keyboard
     shortcuts, gestures, focus, AND the navbar dropdowns/mobile menu that
     formerly lived in /assets/js/navigation.js (now deprecated). -->
<script type="module" src="{{ '/assets/js/modules/navigation/index.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>

<!-- Generic UI helpers (toast, copy-to-clipboard, image fade-in) -->
<script defer src="{{ '/assets/js/ui-helpers.js' | relative_url }}"></script>

<!-- Posts-archive pagination (auto-activates only on pages with a
     [data-posts-archive] container; safe to load globally). -->
<script defer src="{{ '/assets/js/posts-pagination.js' | relative_url }}"></script>

<!-- Search modal controller -->
<script src="{{ '/assets/js/search-modal.js' | relative_url }}"></script>

<!-- Share helpers -->
<script src="{{ '/assets/js/share-actions.js' | relative_url }}"></script>

<!-- fffuel-style background customizer (skin switching, toggle, opacity) -->
<script src="{{ '/assets/js/background-customizer.js' | relative_url }}"></script>

<!-- Optional runtime Appearance panel (enabled via site.appearance_panel) -->
{% if site.appearance_panel %}
<script defer src="{{ '/assets/js/modules/theme/appearance.js' | relative_url }}"></script>
{% endif %}

<!-- Obsidian wiki-link / embed / tag client-side resolver (fallback for the
     remote_theme GH Pages build, where _plugins/obsidian_links.rb cannot run).
     Honours `obsidian: { enabled: false }` in _config.yml — when disabled the
     resolver script is not loaded and the flag self-disables any fork that
     loads it another way. Note: `| default: true` would flip `false` back to
     true (Liquid treats false as falsy), so test enabled == false explicitly. -->
{%- assign obsidian_attachments_path = site.obsidian.attachments_path | default: '/assets/images/notes' -%}
<script>
  window.OBSIDIAN_CONFIG = window.OBSIDIAN_CONFIG || {};
  window.OBSIDIAN_CONFIG.enabled = {% if site.obsidian.enabled == false %}false{% else %}true{% endif %};
  window.OBSIDIAN_CONFIG.wikiIndexUrl = {{ '/assets/data/wiki-index.json' | relative_url | jsonify }};
  window.OBSIDIAN_CONFIG.attachmentsPath = {{ obsidian_attachments_path | relative_url | jsonify }};
  window.OBSIDIAN_CONFIG.tagBase = {{ '/tags/' | relative_url | jsonify }};
  window.OBSIDIAN_CONFIG.cytoscapeUrl = {{ '/assets/vendor/cytoscape/cytoscape.min.js' | relative_url | jsonify }};
</script>
{%- if site.obsidian.enabled != false -%}
<script defer src="{{ '/assets/js/obsidian-wiki-links.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
{%- endif -%}

<!-- Optional fork overrides: opt-in via `site.user_overrides: true` in _config.yml. -->
{% if site.user_overrides %}
<script defer src="{{ '/assets/js/user-overrides.js' | relative_url }}"></script>
{% endif %}
