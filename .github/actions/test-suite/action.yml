name: 'Run Ruby Test Suite'
description: 'RSpec-based test suite with environment setup'
inputs:
  ruby-version:
    description: 'Ruby version to use'
    default: '3.2'
    required: false
  verbose:
    description: 'Run tests in verbose mode'
    default: 'true'
    required: false
  suites:
    description: 'RSpec tag filter: all, schemas, plugins, features, build, content, integration, quality'
    default: 'all'
    required: false
  skip-docker:
    description: 'Skip Docker-related tests (unused, kept for backward compat)'
    default: 'true'
    required: false
  skip-remote:
    description: 'Skip remote installation tests (unused, kept for backward compat)'
    default: 'false'
    required: false

runs:
  using: composite
  steps:
    - name: Setup Ruby Environment
      uses: ./.github/actions/setup-ruby
      with:
        ruby-version: ${{ inputs.ruby-version }}

    - name: Set PAGES_REPO_NWO for Jekyll builds
      shell: bash
      run: |
        # Set PAGES_REPO_NWO for jekyll-github-metadata gem
        echo "PAGES_REPO_NWO=${PAGES_REPO_NWO:-${{ github.repository }}}" >> $GITHUB_ENV

    - name: Run RSpec Test Suite
      shell: bash
      run: |
        FORMAT_FLAG=""
        if [[ "${{ inputs.verbose }}" == "true" ]]; then
          FORMAT_FLAG="--format documentation"
        fi

        SUITE="${{ inputs.suites }}"
        if [[ "$SUITE" == "all" || -z "$SUITE" ]]; then
          bundle exec rspec $FORMAT_FLAG
        else
          # Run specific spec directories based on suite name
          SPEC_PATHS=""
          IFS=',' read -ra SUITES <<< "$SUITE"
          for s in "${SUITES[@]}"; do
            s=$(echo "$s" | xargs)  # trim whitespace
            case "$s" in
              core)        SPEC_PATHS="$SPEC_PATHS spec/build/ spec/plugins/" ;;
              quality)     SPEC_PATHS="$SPEC_PATHS spec/quality/" ;;
              schemas)     SPEC_PATHS="$SPEC_PATHS spec/schemas/" ;;
              plugins)     SPEC_PATHS="$SPEC_PATHS spec/plugins/" ;;
              features)    SPEC_PATHS="$SPEC_PATHS spec/features/" ;;
              build)       SPEC_PATHS="$SPEC_PATHS spec/build/" ;;
              content)     SPEC_PATHS="$SPEC_PATHS spec/content/" ;;
              integration) SPEC_PATHS="$SPEC_PATHS spec/integration/" ;;
              tokens)      SPEC_PATHS="$SPEC_PATHS spec/tokens/" ;;
              *)           echo "::warning::Unknown suite: $s, running all specs"
                           SPEC_PATHS="spec/"
                           break ;;
            esac
          done
          bundle exec rspec $FORMAT_FLAG $SPEC_PATHS
        fi
        shopt -u nullglob
        
        if [[ "$FAILED" == "true" ]]; then
          exit 1
        fi
        
        echo "::notice::All tests passed successfully"