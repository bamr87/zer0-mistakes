name: 'Setup Ruby Environment'
description: 'Sets up Ruby, installs gems (non-frozen) with caching, and common deps'

inputs:
  ruby-version:
    description: 'Ruby version to use'
    required: false
    default: '3.3'
  install-system-deps:
    description: 'Install system dependencies (jq)'
    required: false
    default: 'true'
  bundler-cache:
    description: 'Cache installed gems between runs'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Ruby ${{ inputs.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby-version }}
        # NOTE: we deliberately do NOT enable ruby/setup-ruby's `bundler-cache`.
        # That option forces bundler into frozen/deployment mode, which is
        # incompatible with this repo: the theme is a path gem (the Gemfile uses
        # `gemspec`) whose gemspec derives `s.files` from `git ls-files`. On a
        # clean install bundler then treats the path-gem spec as changed vs the
        # fileless lockfile and aborts with "The gemspecs for path gems changed,
        # but the lockfile can't be updated because frozen mode is set". We cache
        # and install non-frozen below instead; the committed Gemfile.lock is
        # consistent (re-resolving yields an identical file), so non-frozen
        # install does not drift it. Bundler version comes from Gemfile.lock.
        bundler-cache: false

    - name: Cache bundler gems
      if: inputs.bundler-cache == 'true'
      uses: actions/cache@v4
      with:
        path: vendor/bundle
        key: bundle-${{ runner.os }}-ruby-${{ inputs.ruby-version }}-${{ hashFiles('Gemfile.lock') }}
        restore-keys: |
          bundle-${{ runner.os }}-ruby-${{ inputs.ruby-version }}-

    - name: Install system dependencies
      if: inputs.install-system-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y jq

    - name: Install Ruby dependencies (non-frozen)
      shell: bash
      run: |
        bundle config set --local path vendor/bundle
        bundle config set --local frozen false
        bundle config unset deployment 2>/dev/null || true
        bundle install --jobs 4 --retry 3

    - name: Make scripts executable
      shell: bash
      run: chmod +x scripts/*.sh test/*.sh 2>/dev/null || true
