name: 'Quality Control Checks'
description: 'Run RSpec quality specs and project structure validation'
inputs:
  ruby-version:
    description: 'Ruby version to use'
    default: '3.2'
    required: false
  check-markdown:
    description: 'Run markdown format checks'
    default: 'true'
    required: false
  fix-formatting:
    description: 'Automatically fix formatting issues'
    default: 'false'
    required: false

runs:
  using: composite
  steps:
    - name: Setup Ruby Environment
      uses: ./.github/actions/setup-ruby
      with:
        ruby-version: ${{ inputs.ruby-version }}

    - name: Run RSpec Quality Specs
      shell: bash
      run: |
        bundle exec rspec spec/quality/ --format documentation
        echo "::notice::RSpec quality checks completed"

    - name: Check Markdown Formatting
      if: inputs.check-markdown == 'true'
      shell: bash
      run: |
        if [[ -x ./scripts/fix-markdown-format.sh ]]; then
          chmod +x ./scripts/fix-markdown-format.sh

          if [[ "${{ inputs.fix-formatting }}" == "true" ]]; then
            ./scripts/fix-markdown-format.sh
            echo "::notice::Markdown formatting issues fixed automatically"
          else
            ./scripts/fix-markdown-format.sh --dry-run || {
              echo "::error::Markdown formatting issues found. Run with fix-formatting=true to auto-fix"
              exit 1
            }
            echo "::notice::Markdown formatting is correct"
          fi
        else
          echo "::notice::Markdown format script not found, skipping"
        fi

    - name: Validate Project Structure
      shell: bash
      run: |
        REQUIRED_FILES=("README.md" "CHANGELOG.md" "LICENSE" "jekyll-theme-zer0.gemspec" "Gemfile")
        for file in "${REQUIRED_FILES[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "::error::Required file missing: $file"
            exit 1
          fi
        done

        REQUIRED_DIRS=("_layouts" "_includes" "assets" "scripts")
        for dir in "${REQUIRED_DIRS[@]}"; do
          if [[ ! -d "$dir" ]]; then
            echo "::error::Required directory missing: $dir"
            exit 1
          fi
        done

        echo "::notice::Project structure validation passed"