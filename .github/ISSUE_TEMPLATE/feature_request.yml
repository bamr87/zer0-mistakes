name: Feature request
description: Propose an enhancement to the theme or its tooling
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](https://zer0-mistakes.com/roadmap/) first — your
        idea may already be planned. Accepted requests are filed into
        `_data/backlog.yml` and picked up by the continuous-evolution loop.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen? Sketch the UX/API if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
