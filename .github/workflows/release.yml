name: Release

# Standardized release pipeline — replaces the bespoke version-bump.yml +
# release.yml. Conventional Commits drive release-please, which opens a release
# PR (bumps lib/jekyll-theme-zer0/version.rb + package.json + CHANGELOG.md).
# Merging that PR tags vX.Y.Z, creates the GitHub Release, and publish.yml
# builds the gem (via scripts/build) and pushes it to RubyGems.
#
# Shared definitions live in bamr87/.github. See release-please-config.json.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: bamr87/.github/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit

  publish:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: bamr87/.github/.github/workflows/publish.yml@main
    with:
      tag: ${{ needs.release.outputs.tag_name }}
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    secrets: inherit
