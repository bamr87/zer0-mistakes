# Feature: ZER0-018
name: CodeQL Security Scanning

# Least-privilege default; the analyze job below grants exactly what it needs.
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.js'
      - '**.ts'
      - '**.rb'
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '_plugins/**'
      - 'scripts/**'
      - 'lib/**'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.js'
      - '**.ts'
      - '**.rb'
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '_plugins/**'
      - 'scripts/**'
      - 'lib/**'
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    - cron: '37 1 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none
        - language: ruby
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
