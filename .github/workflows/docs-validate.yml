name: Docs Validation

on:
  pull_request:
    paths:
      - "docs/**"
      - "pages/_docs/**"
      - ".github/instructions/documentation.instructions.md"

# Read-only by default; individual jobs only check out and lint.
permissions:
  contents: read

jobs:
  lint-frontmatter:
    name: Front matter compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Check front matter
        run: bash scripts/docs/lint-frontmatter.sh

  check-links:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        run: bash scripts/docs/check-links.sh

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      # Blocking since the 2026-06 baseline cleanup (T-014): zero violations
      # with .github/config/.markdownlint.json. Do not re-add warn-only
      # suppressions — fix the markdown or tune the shared config instead.
      - name: Lint docs/ (excluding archive)
        run: |
          markdownlint "docs/**/*.md" \
            --ignore "docs/archive/**" \
            --config .github/config/.markdownlint.json

      - name: Lint pages/_docs/
        run: |
          markdownlint "pages/_docs/**/*.md" \
            --config .github/config/.markdownlint.json
