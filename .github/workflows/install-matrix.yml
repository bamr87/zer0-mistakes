---
name: Install Matrix

# Validate the modular installer across OSes, Ruby versions, and profiles:
#   - matrix:               full installer e2e (os x ruby)
#   - curl-bash-bootstrap:  the README one-liner (curl | bash) remote install
#   - doctor:               the `install doctor` environment diagnostic
# Triggered on PRs that touch installer code or weekly to catch drift.

on:
  push:
    branches: [main]
    paths:
      - install.sh
      - scripts/bin/install
      - scripts/lib/install/**
      - scripts/platform/**
      - templates/profiles/**
      - templates/deploy/**
      - test/test_install_*.sh
      - test/lib/install_test_utils.sh
      - .github/workflows/install-matrix.yml
  pull_request:
    paths:
      - install.sh
      - scripts/bin/install
      - scripts/lib/install/**
      - scripts/platform/**
      - templates/profiles/**
      - templates/deploy/**
      - test/test_install_*.sh
      - test/lib/install_test_utils.sh
  schedule:
    # Mondays @ 06:00 UTC — weekly drift check
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix:
    name: ${{ matrix.os }} · ruby-${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Ruby 3.2+ required: Bundler 2.7.x (pinned in Gemfile.lock) needs >= 3.2.0.
        # Ruby 2.7 / 3.0 / 3.1 are EOL upstream; project floor moved with Bundler.
        ruby: ['3.2', '3.3']

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Install jq + python3 (assertion helpers)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq python3-yaml
          else
            brew install jq python3 || true
            python3 -m pip install --user pyyaml || true
          fi

      - name: Show toolchain
        run: |
          ruby --version
          bundle --version
          bash --version | head -1
          jq --version || true
          python3 --version || true

      - name: Run installer e2e test suite
        env:
          # Skip interactive paths in CI (gh auth, fork prompts).
          INSTALL_TEST_INCLUDE_INTERACTIVE: '0'
          INSTALL_TEST_INCLUDE_REMOTE: '0'
        run: |
          chmod +x scripts/bin/install scripts/bin/test test/test_install_*.sh
          ./scripts/bin/test install

      - name: Upload installer test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-test-results-${{ matrix.os }}-ruby${{ matrix.ruby }}
          path: |
            test/results/
            test/reports/
          if-no-files-found: ignore
          retention-days: 14

  curl-bash-bootstrap:
    name: curl|bash bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Simulate remote install (no source files in target)
        shell: bash
        run: |
          set -euo pipefail
          TARGET="$RUNNER_TEMP/remote-bootstrap"
          mkdir -p "$TARGET"
          cd "$TARGET"
          # Exercise README one-liner behavior: stream installer to bash stdin.
          # Running in a clean dir forces REMOTE_INSTALL=true code path.
          cat "$GITHUB_WORKSPACE/install.sh" | bash -s -- --minimal "$TARGET"
          test -f "$TARGET/_config.yml"
          test -f "$TARGET/Gemfile"
          test -f "$TARGET/index.md"
          echo "✅ curl|bash-equivalent bootstrap produced a minimal site"

  doctor:
    name: doctor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Make installer executable
        run: chmod +x scripts/bin/install

      - name: Print version
        run: ./scripts/bin/install version

      - name: Run doctor (no AI) — JSON output
        id: doctor
        run: |
          set -e
          ./scripts/bin/install doctor --json | tee doctor.json
          # Parse counts without jq (POSIX-only). FAIL > 0 is a hard error.
          fail=$(grep -oE '"fail":[0-9]+' doctor.json | head -1 | cut -d: -f2)
          echo "fail_count=${fail:-0}" >> "$GITHUB_OUTPUT"

      - name: Run doctor (verbose) — non-blocking, for log readability
        if: always()
        run: ./scripts/bin/install doctor || true

      - name: Fail if any FAIL rows
        if: steps.doctor.outputs.fail_count != '0'
        run: |
          echo "::error::install doctor reported ${{ steps.doctor.outputs.fail_count }} FAIL row(s)"
          exit 1
