name: Docs Freshness Check

on:
  schedule:
    # First of each month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  freshness:
    name: Check for stale docs
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      issues: write    # open the freshness-review issue

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log dates

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run freshness check
        id: freshness
        run: |
          set +e
          output=$(bash scripts/docs/check-freshness.sh 2>&1)
          exit_code=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "stale=$([[ $exit_code -ne 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Open GitHub issue for stale docs
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
            const body = [
              '## Docs Freshness Review — ' + month,
              '',
              'The monthly freshness check found docs whose `lastmod` front matter is > 60 days',
              'behind the last git commit on that file. Review each file and update `lastmod`',
              'if the content is still accurate, or edit the doc if code has since changed.',
              '',
              '```',
              `${{ steps.freshness.outputs.output }}`,
              '```',
              '',
              'Run `./scripts/docs/check-freshness.sh --verbose` locally for details.',
              '',
              '_Opened automatically by the [Docs Freshness workflow](.github/workflows/docs-freshness.yml)._'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Docs freshness review — ${month}`,
              body,
              labels: ['documentation', 'maintenance']
            });
