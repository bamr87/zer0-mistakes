name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Daily scheduled testing is handled by test-latest.yml (zero-pin strategy).
# This workflow focuses on push/PR validation.
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope'
        required: false
        default: 'standard'
        type: choice
        options:
          - 'fast'        # Quick feedback (skip Docker)
          - 'standard'    # Full test suite + Docker integration
      fix_markdown:
        description: 'Auto-fix markdown formatting'
        required: false
        default: false
        type: boolean

env:
  RUBY_VERSION: '3.3'
  NODE_VERSION: '18'
  PAGES_REPO_NWO: ${{ vars.PAGES_REPO_NWO || github.repository }}

defaults:
  run:
    shell: bash

# ==============================================================================
# Job dependency graph:
#
#   fast-checks
#     └── quality-checks ─┬── test ── build
#                          └── integration (skipped on fast scope)
# ==============================================================================
jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Environment
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          install-system-deps: false

      - name: Quick Syntax Check
        run: ruby -c lib/jekyll-theme-zer0/version.rb

      - name: Validate Gemspec
        run: |
          ruby -e "
            spec = Gem::Specification.load('jekyll-theme-zer0.gemspec')
            puts '✅ Gemspec valid: #{spec.name} v#{spec.version}'
          "

  quality-checks:
    name: Quality Control
    runs-on: ubuntu-latest
    needs: fast-checks
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Quality Checks
        uses: ./.github/actions/quality-checks
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          check-markdown: true
          fix-formatting: ${{ inputs.fix_markdown }}

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: quality-checks
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Test Suite
        uses: ./.github/actions/test-suite
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          verbose: true
          suites: core,quality
          skip-docker: true

      - name: Setup Node.js (styling tests)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Frontend styling tests (Playwright)
        env:
          PAGES_REPO_NWO: ${{ env.PAGES_REPO_NWO }}
        run: |
          npm ci
          npx playwright install --with-deps chromium
          ./test/test_styling.sh

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test/results/
          retention-days: 7

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: test/coverage/
          retention-days: 7

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby environment
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          install-system-deps: true

      - name: Build gem
        run: |
          chmod +x ./scripts/build
          ./scripts/build

      - name: Validate gem
        run: |
          VERSION=$(ruby -e "require './lib/jekyll-theme-zer0/version'; puts JekyllThemeZer0::VERSION")
          GEM_FILE="jekyll-theme-zer0-${VERSION}.gem"

          if [ -f "$GEM_FILE" ]; then
            echo "✅ Gem built successfully: $GEM_FILE"
            gem spec "$GEM_FILE" | grep -E "(name|version|files)" | head -5
          else
            echo "❌ Gem file not found: $GEM_FILE"
            ls -la *.gem 2>/dev/null || echo "No .gem files found"
            exit 1
          fi

      - name: Test gem installation
        run: |
          bundle install --quiet
          gem install ./jekyll-theme-zer0-*.gem --local --no-document --ignore-dependencies
          echo "✅ Gem installs successfully"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    if: inputs.test_scope != 'fast'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/Dockerfile', 'Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and start Jekyll in Docker
        run: |
          echo "🔨 Building Docker image with layer caching..."
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t zer0-mistakes-jekyll:latest \
            -f docker/Dockerfile \
            --target dev-test \
            .
          
          # Move cache to avoid unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true
          
          echo "🚀 Starting Jekyll container..."
          docker compose up -d
          
          echo "⏳ Waiting for Jekyll to start..."
          MAX_WAIT=120
          ELAPSED=0
          INTERVAL=2
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CONTAINER_STATUS=$(docker compose ps --format json 2>/dev/null | grep -o '"State":"[^"]*"' | head -1 || echo "")
            if echo "$CONTAINER_STATUS" | grep -q "running"; then
              if curl -sf --max-time 3 http://localhost:4000 > /dev/null 2>&1; then
                echo "✅ Site is accessible after ${ELAPSED}s"
                break
              fi
            fi
            
            if docker compose ps | grep -q "exited\|dead"; then
              echo "❌ Container crashed!"
              docker compose logs --tail=50
              exit 1
            fi
            
            if [ $((ELAPSED % 30)) -eq 0 ] && [ $ELAPSED -gt 0 ]; then
              echo "📊 Still waiting... (${ELAPSED}s elapsed)"
            fi
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            
            if [ $INTERVAL -lt 10 ]; then
              INTERVAL=$((INTERVAL + 1))
            fi
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            if curl -sf --max-time 5 http://localhost:4000 > /dev/null 2>&1; then
              echo "✅ Site became accessible at ${ELAPSED}s"
            else
              echo "❌ Timeout: Site not accessible after ${MAX_WAIT}s"
              docker compose logs --tail=100
              exit 1
            fi
          fi

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Test critical pages
        run: |
          echo "🔍 Testing critical page accessibility..."
          
          CRITICAL_PATHS=(
            "/"
            "/docs/"
            "/about/"
            "/search.json"
            "/sitemap.xml"
            "/feed.xml"
          )
          
          OPTIONAL_PATHS=(
            "/blog/"
            "/features/"
            "/categories/"
            "/tags/"
          )
          
          FAILED=0
          
          for path in "${CRITICAL_PATHS[@]}"; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "http://localhost:4000${path}" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ CRITICAL: ${path} (HTTP ${STATUS})"
            else
              echo "❌ CRITICAL FAIL: ${path} (HTTP ${STATUS})"
              FAILED=$((FAILED + 1))
            fi
          done
          
          for path in "${OPTIONAL_PATHS[@]}"; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "http://localhost:4000${path}" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ OPTIONAL: ${path} (HTTP ${STATUS})"
            else
              echo "⚠️ OPTIONAL: ${path} (HTTP ${STATUS})"
            fi
          done
          
          if [[ $FAILED -gt 0 ]]; then
            echo "::error::${FAILED} critical page(s) failed accessibility test"
            docker compose logs --tail=50
            exit 1
          fi
          
          echo "✅ All critical pages are accessible"

      - name: Cleanup
        if: always()
        run: docker compose down --volumes --remove-orphans || true
