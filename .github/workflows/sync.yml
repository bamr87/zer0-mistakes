name: Sync

# Mirror tracked data files to GitHub on push to main; validate on PRs.
#   - backlog:  _data/backlog.yml -> GitHub Issues (scripts/sync-backlog.rb)
#   - roadmap:  _data/roadmap.yml -> README roadmap section (scripts/generate-roadmap.rb)
# Both jobs are idempotent, so either may no-op when only the other's files changed.

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '_data/backlog.yml'
      - '_data/roadmap.yml'
      - 'scripts/sync-backlog.rb'
      - 'scripts/sync-backlog.sh'
      - 'scripts/generate-roadmap.rb'
      - 'scripts/generate-roadmap.sh'
      - 'lib/jekyll-theme-zer0/version.rb'
      - '.github/workflows/sync.yml'
  pull_request:
    paths:
      - '_data/backlog.yml'
      - '_data/roadmap.yml'
      - 'scripts/sync-backlog.rb'
      - 'scripts/sync-backlog.sh'
      - 'scripts/generate-roadmap.rb'
      - 'scripts/generate-roadmap.sh'
      - 'lib/jekyll-theme-zer0/version.rb'
      - 'README.md'
      - '.github/workflows/sync.yml'
  workflow_dispatch:

concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # _data/backlog.yml -> GitHub Issues. PRs validate the schema only (no writes),
  # so a malformed backlog can never reach main.
  backlog:
    name: Backlog -> Issues
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Validate backlog schema (PRs)
        if: github.event_name == 'pull_request'
        run: ruby scripts/sync-backlog.rb --check

      - name: Sync backlog to issues (push / manual)
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/sync-backlog.rb

  # _data/roadmap.yml -> README roadmap section. PRs fail if README is stale;
  # push regenerates and commits the diff with [skip ci].
  roadmap:
    name: Roadmap -> README
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Validate roadmap integrity & version tracking
        run: ruby scripts/generate-roadmap.rb --validate

      - name: Verify roadmap is in sync (PRs)
        if: github.event_name == 'pull_request'
        run: ruby scripts/generate-roadmap.rb --check

      - name: Regenerate roadmap (push / manual)
        if: github.event_name != 'pull_request'
        run: ruby scripts/generate-roadmap.rb

      # Open a PR instead of pushing to main directly (main is protected).
      # Stable branch → repeated runs update the same PR rather than spawning new
      # ones. NOTE: PRs opened with GITHUB_TOKEN do not auto-trigger CI (GitHub's
      # recursion guard); close/reopen the PR to run checks, or merge directly.
      - name: Open PR for README changes
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: README.md
          branch: chore/roadmap-readme
          delete-branch: true
          commit-message: "docs(roadmap): regenerate README from _data/roadmap.yml"
          title: "docs(roadmap): regenerate README from _data/roadmap.yml"
          body: |
            Automated: regenerated the README roadmap section from
            `_data/roadmap.yml` via `scripts/generate-roadmap.rb`.

            Opened as a PR (not a direct push to `main`) so every change flows
            through review + branch protection. PRs opened by `GITHUB_TOKEN` don't
            auto-trigger CI — close/reopen to run checks, or merge directly.

            *Automated by the [sync workflow](../.github/workflows/sync.yml).*
          labels: automated
          assignees: bamr87
